ci:
  autoupdate_schedule: quarterly
  skip: [pip-compile, vue-cli-service-lint]
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.3
    hooks:
      - id: pip-compile
        name: pip-compile requirements.in
        args: [requirements.in, -o, requirements.txt]
      - id: pip-compile
        name: pip-compile requirements_dev.in
        args: [requirements_dev.in, -o, requirements_dev.txt]
        files: ^requirements(_dev)?\.(in|txt)$
  - repo: local
    hooks:
      - id: vue-cli-service-lint
        name: vue-cli-service lint
        entry: pnpm --dir frontend exec vue-cli-service lint
        language: system
        files: ^frontend/.*\.(js|jsx|vue)$
        pass_filenames: false
